name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  app-build:
    name: app-build
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        ref: ${{ github.event.pull_request.head.sha || github.sha }}
    - name: Use Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 'latest'
    - name: Install dependencies
      run: npm ci
    - name: Build application
      run: npm run build:electron
