version: "3.9"

networks:
  appnet:
    driver: bridge

volumes:
  valkey-7001:
  valkey-7002:
  valkey-7003:
  valkey-7004:
  valkey-7005:
  valkey-7006:


services:
  # ---------------- Valkey Cluster Nodes ----------------
  valkey-7001:
    image: valkey/valkey-bundle:latest
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    command: >
      valkey-server
      --port 7001
      --bind 0.0.0.0
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --cluster-announce-port 7001
      --cluster-announce-bus-port 17001
      --cluster-announce-hostname valkey-7001
      --cluster-preferred-endpoint-type hostname
      --appendonly no
      --protected-mode no
      --ignore-warnings ARM64-COW-BUG
    environment:
      - ANNOUNCE_HOST=valkey-7001
    healthcheck:
      test: ["CMD", "valkey-cli", "-p", "7001", "PING"]
      interval: 2s
      timeout: 1s
      retries: 30
    ports: ["7001:7001", "17001:17001"]
    volumes:
      - valkey-7001:/data
      - ../tools/valkey-cluster/rejson.so:/opt/modules/rejson.so:ro
    networks:
      - appnet

  valkey-7002:
    image: valkey/valkey-bundle:latest
    platform: ${DOCKER_PLATFORM:-linux/amd64}
