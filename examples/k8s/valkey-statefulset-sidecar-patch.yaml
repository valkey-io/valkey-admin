spec:
  template:
    spec:
      containers:
        - name: metrics
          image: valkey-admin-metrics:test
          imagePullPolicy: Never
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: PORT
              value: "3000"
            - name: CONFIG_PATH
              value: /app/config/config.yml
            - name: VALKEY_HOST
              value: $(POD_NAME).valkey-headless.$(POD_NAMESPACE).svc.cluster.local
            - name: VALKEY_PORT
              value: "6379"
            - name: VALKEY_MODE
              value: cluster
            - name: SERVER_HOST
              value: valkey-admin-app
            - name: SERVER_PORT
              value: "8080"
            - name: METRICS_ADVERTISE_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: METRICS_ADVERTISE_PORT
              value: "3000"
          ports:
            - containerPort: 3000
              name: metrics
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - mountPath: /app/config
              name: metrics-config
              readOnly: true
            - mountPath: /app/data
              name: metrics-data
      volumes:
        - name: metrics-config
          configMap:
            name: valkey-admin-metrics-config
        - name: metrics-data
          emptyDir: {}
