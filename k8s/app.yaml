apiVersion: apps/v1
kind: Deployment
metadata:
  name: valkey-admin-app
  namespace: valkey
spec:
  replicas: 1
  selector:
    matchLabels:
      app: valkey-admin-app
  template:
    metadata:
      labels:
        app: valkey-admin-app
    spec:
      containers:
        - name: app
          image: valkey-admin-app:test
          imagePullPolicy: Never
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "8080"
            - name: USE_CLUSTER_ORCHESTRATOR
              value: "true"
            - name: VALKEY_HOST
              value: valkey-0.valkey-headless.valkey.svc.cluster.local
            - name: VALKEY_PORT
              value: "6379"
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: valkey-admin-app
  namespace: valkey
spec:
  selector:
    app: valkey-admin-app
  ports:
    - name: http
      port: 8080
      targetPort: http
