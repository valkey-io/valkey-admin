name: Draft release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
    - name: Use Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 'latest'
    - name: Install dependencies
      run: npm ci
    - name: Package unsigned mac app
      run: npm run package:mac:nosign
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Upload mac artifacts
      uses: actions/upload-artifact@v4
      with:
        name: mac-artifacts
        path: ./release/*-arm64.dmg

  build-linux:
    strategy:
      matrix:
        include:
          - arch: x64
            runner: ubuntu-latest
            package_script: package:linux
          - arch: arm64
            runner: ubuntu-24.04-arm
            package_script: package:linux:arm64
    runs-on: ${{ matrix.runner }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
    - name: Use Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 'latest'
    - name: Install dependencies
      run: npm ci
    - name: Import GPG key
      run: |
        echo "${{ secrets.GPG_PRIVATE_KEY }}" | base64 --decode | gpg --batch --import
    - name: Package Linux app (${{ matrix.arch }})
      run: npm run ${{ matrix.package_script }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
        GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
    - name: Upload linux artifacts (${{ matrix.arch }})
      uses: actions/upload-artifact@v4
      with:
        name: linux-${{ matrix.arch }}-artifacts
        path: |
          ./release/*.AppImage
          ./release/*.AppImage.asc
          ./release/*.deb
          ./release/*.deb.asc

  release-draft:
    needs: [build-mac, build-linux]
    runs-on: ubuntu-latest
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: ./release
        merge-multiple: true
    - name: 'Create Draft release'
      uses: softprops/action-gh-release@v2
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        files: ./release/*
        draft: true
        generate_release_notes: true
